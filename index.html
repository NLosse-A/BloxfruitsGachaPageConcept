<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blox Fruits Official Website</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="page-container">

            HERO SECTION
        =========================================== -->

        <section id="hero" class="hero">

            </video>

            <div class="video-overlay"></div>

            <header>
                <img src="src/images/logo.avif" alt="Blox Fruits" class="logo">

                    <a href="#hero" class="nav-btn red">GAME</a>
                    <a href="#merch" class="nav-btn purple">MERCH</a>
                    <a href="#stats" class="nav-btn blue">DLC</a>
                    <a href="#news" class="nav-btn cyan">NEWS</a>
                </nav>
            </header>

            <article class="news-card">
                <h2>Control Upd is HERE!</h2>

                <p>
                    The Mythical Control Fruit is finally getting
                    its long awaited rework.
                </p>
            </article>

            <div class="roblox-button">
                <a href="https://roblox.com" target="_blank" rel="noopener noreferrer">

                    <img src="src/images/click.png" alt="Play on Roblox">
                </a>
            </div>

            <div class="yellow-arrow-divider"></div>

        </section>

        <main>


        </main>

    </div>
